<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Head pose, facial-landmark and gaze tracking">
  <rect width="800" height="600" fill="#eef2ff"/>
  <rect x="12" y="12" width="776" height="576" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="10 8"/>

  <!-- head -->
  <ellipse cx="320" cy="300" rx="150" ry="185" fill="#ffffff" stroke="#4f46e5" stroke-width="3"/>

  <!-- landmark mesh (thin connective lines) -->
  <g stroke="#a5b4fc" stroke-width="1.4" fill="none">
    <path d="M250 235 L260 300 L300 360 L340 360 L380 300 L390 235 L320 215 Z"/>
    <path d="M250 235 L320 300 L390 235 M260 300 L380 300 M300 360 L320 300 L340 360"/>
    <path d="M210 290 L260 300 L255 360 M430 290 L380 300 L385 360"/>
  </g>

  <!-- eyes -->
  <g>
    <ellipse cx="265" cy="255" rx="26" ry="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <ellipse cx="375" cy="255" rx="26" ry="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <circle cx="272" cy="255" r="7" fill="#4f46e5"/>
    <circle cx="382" cy="255" r="7" fill="#4f46e5"/>
  </g>
  <!-- brows -->
  <path d="M238 232 q27 -12 54 -2 M348 230 q27 -10 54 2" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>
  <!-- nose + mouth -->
  <path d="M320 268 L320 320 L305 332" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M278 372 q42 26 84 0" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>

  <!-- landmark dots -->
  <g fill="#4f46e5">
    <circle cx="320" cy="215" r="4"/><circle cx="250" cy="235" r="4"/><circle cx="390" cy="235" r="4"/>
    <circle cx="208" cy="295" r="4"/><circle cx="432" cy="295" r="4"/><circle cx="222" cy="360" r="4"/>
    <circle cx="418" cy="360" r="4"/><circle cx="320" cy="320" r="4"/><circle cx="278" cy="372" r="4"/>
    <circle cx="362" cy="372" r="4"/><circle cx="265" cy="430" r="4"/><circle cx="375" cy="430" r="4"/>
    <circle cx="320" cy="460" r="4"/>
  </g>

  <!-- gaze vector -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <line x1="320" y1="290" x2="600" y2="210" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="320" cy="290" r="6" fill="#f59e0b"/>

  <!-- head-pose mini axes (roll/pitch/yaw) -->
  <g stroke-width="3" stroke-linecap="round">
    <line x1="650" y1="470" x2="650" y2="410" stroke="#4f46e5"/>
    <line x1="650" y1="470" x2="710" y2="470" stroke="#22c55e"/>
    <line x1="650" y1="470" x2="615" y2="505" stroke="#ef4444"/>
  </g>

  <text x="400" y="556" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#4f46e5" text-anchor="middle">Head pose · landmarks · gaze</text>
</svg>
